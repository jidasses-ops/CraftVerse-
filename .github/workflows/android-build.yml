name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build
        run: |
          chmod +x gradlew
          # On désactive la doc et les traductions ici pour éviter l'erreur CMake
          ./gradlew assembleRelease -Pbuild_doc=OFF -Pbuild_po=OFF
